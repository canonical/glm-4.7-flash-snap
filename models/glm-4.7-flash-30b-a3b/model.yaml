name: glm-4.7-flash-30b-a3b
description: GLM-4.7-Flash, a 30B-A3B mixture-of-experts instruction-tuned model with reasoning and tool-calling
model-card-url: https://huggingface.co/unsloth/GLM-4.7-Flash-GGUF
quantization: q4-k-m

disk-size: 18312M

capabilities:
  - text
  - thinking
  - tools

components:
  - model-q4-k-m-gguf-1-of-4
  - model-q4-k-m-gguf-2-of-4
  - model-q4-k-m-gguf-3-of-4
  - model-q4-k-m-gguf-4-of-4

environment:
  # All shards are symlinked into a single directory (see layout below) so that
  # llama-server can auto-discover shards 2..4 when pointed at shard 1.
  - SHARDS_DIR=/tmp/glm47flash-q4km-shards
  - MODEL_FILE=$SHARDS_DIR/GLM-4.7-Flash-Q4_K_M-00001-of-00004.gguf
  - MODEL_NAME=glm-4.7-flash

layout:
  $SHARDS_DIR/GLM-4.7-Flash-Q4_K_M-00001-of-00004.gguf:
    symlink: $SNAP_COMPONENTS/model-q4-k-m-gguf-1-of-4/GLM-4.7-Flash-Q4_K_M-00001-of-00004.gguf
  $SHARDS_DIR/GLM-4.7-Flash-Q4_K_M-00002-of-00004.gguf:
    symlink: $SNAP_COMPONENTS/model-q4-k-m-gguf-2-of-4/GLM-4.7-Flash-Q4_K_M-00002-of-00004.gguf
  $SHARDS_DIR/GLM-4.7-Flash-Q4_K_M-00003-of-00004.gguf:
    symlink: $SNAP_COMPONENTS/model-q4-k-m-gguf-3-of-4/GLM-4.7-Flash-Q4_K_M-00003-of-00004.gguf
  $SHARDS_DIR/GLM-4.7-Flash-Q4_K_M-00004-of-00004.gguf:
    symlink: $SNAP_COMPONENTS/model-q4-k-m-gguf-4-of-4/GLM-4.7-Flash-Q4_K_M-00004-of-00004.gguf
